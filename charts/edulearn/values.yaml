global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  commonEnv:
    JWT_SECRET: "mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#"
    EUREKA_SERVER_URL: "http://edulearn-discovery-server:8761/eureka/"
    EUREKA_SERVER: "http://edulearn-discovery-server:8761/eureka/"
    KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

images:
  Discovery-Server:
    repository: sanchitkumarsingh098931/discovery-server
    tag: "3f75a0d9fb5c"
  auth-service:
    repository: sanchitkumarsingh098931/auth-service
    tag: "3f75a0d9fb5c"
  course-service:
    repository: sanchitkumarsingh098931/course-service
    tag: "3f75a0d9fb5c"
  lesson-service:
    repository: sanchitkumarsingh098931/lesson-service
    tag: "3f75a0d9fb5c"
  enrollment-service:
    repository: sanchitkumarsingh098931/enrollment-service
    tag: "3f75a0d9fb5c"
  discussion-service:
    repository: sanchitkumarsingh098931/discussion-service
    tag: "3f75a0d9fb5c"
  notification-service:
    repository: sanchitkumarsingh098931/notification-service
    tag: "3f75a0d9fb5c"
  payment-service:
    repository: sanchitkumarsingh098931/payment-service
    tag: "3f75a0d9fb5c"

services:
  Discovery-Server:
    enabled: true
    replicaCount: 1
    port: 8761
    contextPath: ""
    env:
      SERVER_PORT: "8761"
      EUREKA_INSTANCE_HOSTNAME: "edulearn-discovery-server"
  auth-service:
    enabled: true
    replicaCount: 1
    port: 8081
    contextPath: "/api/v1"
    env:
      SERVER_PORT: "8081"
      DB_URL: "jdbc:mysql://mysql:3306/edulearn_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "root"
  course-service:
    enabled: true
    replicaCount: 1
    port: 8082
    contextPath: "/api/v1"
    env:
      SERVER_PORT: "8082"
      DB_URL: "jdbc:mysql://mysql:3306/edulearn_course?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "root"
  lesson-service:
    enabled: true
    replicaCount: 1
    port: 8083
    contextPath: "/api/v1"
    env:
      SERVER_PORT: "8083"
  enrollment-service:
    enabled: true
    replicaCount: 1
    port: 8084
    contextPath: "/api/v1"
    env:
      SERVER_PORT: "8084"
      DB_URL: "jdbc:mysql://mysql:3306/edulearn_enrollment?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "root"
  discussion-service:
    enabled: true
    replicaCount: 1
    port: 8088
    contextPath: "/api/discussion"
    env:
      SERVER_PORT: "8088"
  notification-service:
    enabled: true
    replicaCount: 1
    port: 8089
    contextPath: "/api/notifications"
    env:
      SERVER_PORT: "8089"
      DB_URL: "jdbc:mysql://mysql:3306/edulearn_notification?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "root"
  payment-service:
    enabled: true
    replicaCount: 1
    port: 8086
    contextPath: "/api/v1"
    env:
      SERVER_PORT: "8086"
      DB_URL: "jdbc:mysql://mysql:3306/edulearn_payment?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USERNAME: "root"
      DB_PASSWORD: "root"
