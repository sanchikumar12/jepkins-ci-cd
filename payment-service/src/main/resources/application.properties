# ==================== Server Configuration ====================
server.port=${SERVER_PORT:8086}
server.servlet.context-path=/api/v1

# ==================== Application Name ====================
spring.application.name=payment-service

# ==================== Database Configuration ====================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edulearn_payment?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# ==================== Security Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Razorpay Configuration ====================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SfducQJ6TbXYt3}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:peyxuIWzHnrW9BlxFvnJS2yt}

# ==================== Microservice URLs ====================
enrollment.service.url=${ENROLLMENT_SERVICE_URL:http://localhost:8082/api/v1}

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.edulearn.payment=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG


# Point to the Eureka Server URL
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Optional: Register with Eureka (defaults to true)
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Force Spring to register the JavaTimeModule
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.modules-to-install=com.fasterxml.jackson.datatype.jsr310.JavaTimeModule