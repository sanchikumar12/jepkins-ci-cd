# ==================== Server Configuration ====================
server.port=8088

# ==================== Database Configuration - H2 In-Memory ====================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================== H2 Configuration ====================
spring.h2.console.enabled=true

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ==================== JWT Configuration ====================
jwt.secret=mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#
jwt.expiration=86400000

# ==================== Logging Configuration ====================
logging.level.root=WARN
logging.level.com.edulearn=DEBUG
logging.level.com.edulearn.discussion=DEBUG
logging.level.org.springframework.test.context=DEBUG
logging.level.org.springframework.boot.test.autoconfigure=DEBUG
logging.level.org.springframework.data.repository=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema.internal.SchemaCreatorImpl=DEBUG

