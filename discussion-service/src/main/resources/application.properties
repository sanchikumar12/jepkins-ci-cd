# ==================== Server Configuration ====================
server.port=${SERVER_PORT:8088}
server.servlet.context-path=${CONTEXT_PATH:/api/discussion}

spring.data.mongodb.uri=mongodb+srv://root:root@cluster0.2viutqa.mongodb.net/edulearn_discussion?retryWrites=true&w=majority



# ==================== JWT Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Application Name ====================
spring.application.name=discussion-service

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.edulearn=DEBUG

# ==================== Swagger/OpenAPI Configuration ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.default-models-expand-depth=1
springdoc.swagger-ui.display-request-duration=true

# ==================== Eureka Client Configuration ====================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

