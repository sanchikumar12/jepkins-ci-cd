# ==================== Server Configuration ====================
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api/v1

# ==================== Database Configuration ====================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edulearn_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ==================== JWT Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Google OAuth2 Configuration ====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:113047951808-iinutl6njrqslupct39s5eq9fm3q7hfd.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v2/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=id

# ==================== Gmail OTP Configuration ====================
# Use a Gmail app password, not your normal Gmail login password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
password.reset.otp.expiration-minutes=${PASSWORD_RESET_OTP_EXPIRATION_MINUTES:10}

# ==================== Application Name ====================
spring.application.name=auth-service

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.edulearn=DEBUG

# ==================== Swagger/OpenAPI Configuration ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.default-models-expand-depth=1


# Eureka server URL
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Register with Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

