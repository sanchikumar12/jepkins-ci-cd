# ==================== Server Configuration ====================
server.port=${SERVER_PORT:8083}
server.servlet.context-path=/api/v1

# ==================== MongoDB Configuration ====================
# Pattern: mongodb://[username:password@]host[:port]/database

#spring.data.mongodb.uri=${MONGO_URL:mongodb://localhost:27017/edulearn_lesson}
spring.data.mongodb.uri=mongodb+srv://root:root@cluster0.2viutqa.mongodb.net/edulearn_lesson?retryWrites=true&w=majority

# Optional: Manual configuration if not using URI
# spring.data.mongodb.host=${MONGO_HOST:localhost}
# spring.data.mongodb.port=${MONGO_PORT:27017}
# spring.data.mongodb.database=edulearn_lesson
# spring.data.mongodb.username=${MONGO_USER:root}
# spring.data.mongodb.password=${MONGO_PASSWORD:root123}

# ==================== Security Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Application Name ====================
spring.application.name=lesson-service

# ==================== External Service URLs ====================
enrollment.service.url=${ENROLLMENT_SERVICE_URL:http://localhost:8084/api/v1}

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.edulearn.lesson=DEBUG
# Log MongoDB queries (useful for debugging)
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# ==================== Eureka Client Configuration ====================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true